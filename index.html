<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch trực</title>
    <style>
        :root {
            --primary: #0056B3;
            --bg-body: #f4f7f6;
            --border-color: #e2e8f0;
            --focus-color: #2ecc71;
            --text-main: #2d3748;
            --weekend-color: #b45309;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 30px 20px;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 750px;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin: 0 auto;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #1a202c;
            margin-bottom: 25px;
            font-size: 24px;
        }

        /* Menu điều hướng Tab */
        .tabs-menu {
            display: flex;
            background: #edf2f7;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 25px;
            gap: 2px;
        }

        .tab-link {
            flex: 1;
            text-align: center;
            padding: 10px 5px;
            cursor: pointer;
            font-weight: 600;
            color: #4a5568;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 13px;
            white-space: nowrap;
        }

        .tab-link.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* --- TAB 1: HÔM NAY --- */
        .navigation-box {
            display: none; 
        }

        .nav-btn {
            background: #edf2f7;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #4a5568;
            transition: all 0.2s;
            font-size: 13px;
            flex: 1;
            text-align: center;
        }

        .nav-btn:hover {
            background: #e2e8f0;
            color: var(--primary);
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .day-card {
            display: grid;
            grid-template-columns: 160px 1fr;
            align-items: center;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: #fff;
            box-sizing: border-box;
        }

        .day-info {
            font-weight: bold;
            color: #4a5568;
            font-size: 16px;
        }

        .day-info span {
            display: block;
            font-size: 13px;
            font-weight: normal;
            color: #a0aec0;
            margin-top: 4px;
        }

        .duty-info {
            padding-left: 20px;
            border-left: 2px solid #edf2f7;
        }

        .duty-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #a0aec0;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .duty-name {
            font-size: 18px;
            font-weight: 700;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .is-swapped {
            color: #e53e3e !important;
        }

        .day-card.weekend {
            background: #fffdf5;
            border-color: #fef3c7;
        }

        .day-card.weekend .day-info {
            color: var(--weekend-color);
        }

        .day-card.weekend .duty-info {
            border-left-color: #fef3c7;
        }

        .day-card.today {
            background: #ffffff;
            border: 3px solid var(--focus-color);
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.12);
            position: relative;
        }

        .day-card.today::after {
            content: "HÔM NAY";
            position: absolute;
            right: 20px;
            top: -12px;
            background: var(--focus-color);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        .day-card.today .day-info {
            color: var(--focus-color);
        }

        /* --- TAB 4: FORM HOÁN ĐỔI LỊCH (UI HÀNG DỌC TINH GỌN) --- */
        .swap-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f8fafc;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            max-width: 450px;
            margin: 0 auto;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
        }

        .form-group input {
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            background-color: #ffffff;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
            
            /* Chống highlight văn bản và ẩn con trỏ nhấp nháy */
            user-select: none;
            -webkit-user-select: none;
            caret-color: transparent;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        /* Định dạng lại giao diện các ngày bị vô hiệu hóa (quá khứ) nếu trình duyệt hỗ trợ */
        .form-group input::-webkit-calendar-picker-indicator:disabled {
            opacity: 0.4;
        }

        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
            margin-top: 8px;
            width: 100%;
        }

        .submit-btn:hover {
            background: #004085;
        }

        /* POPUP THÔNG BÁO NHANH (TOAST) */
        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #2e3033;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Cấu trúc bảng */
        .table-container {
            height: 344px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            table-layout: fixed;
        }

        th, td {
            padding: 12px 16px;
            line-height: 19px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            box-sizing: border-box;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        th:nth-child(1), td:nth-child(1) { width: 25%; }
        th:nth-child(2), td:nth-child(2) { width: 20%; }
        th:nth-child(3), td:nth-child(3) { width: 55%; }

        th {
            background: var(--primary);
            color: white;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        tr.table-weekend { background-color: #fffdf5; color: var(--weekend-color); }
        tr.table-today { background-color: #e8fbf0 !important; }
        
        td div.cell-name {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .inline-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #cbd5e1;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            body { padding: 10px 8px; }
            .container { padding: 15px 10px; border-radius: 12px; }
            h1 { font-size: 20px; margin-bottom: 15px; }
            .tab-link { font-size: 11px; padding: 8px 2px; }
            .day-card { grid-template-columns: 85px 1fr; gap: 10px; padding: 10px 12px; }
            .day-info { font-size: 13px; }
            .duty-name { font-size: 14px; }
            th, td { padding: 10px 6px; font-size: 12px; }
            .table-container { height: 304px; }
            .swap-form { padding: 16px; }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📋 Lịch trực</h1>

        <div class="tabs-menu">
            <div class="tab-link active" onclick="switchTab(event, 'focus-sheet')">🎯 Hôm Nay</div>
            <div class="tab-link" onclick="switchTab(event, 'weekday-sheet')">📜 Thứ 2 - 6</div>
            <div class="tab-link" onclick="switchTab(event, 'weekend-sheet')">🏖️ Cuối Tuần</div>
            <div class="tab-link" onclick="switchTab(event, 'swap-sheet')">🔄 Đổi Trực</div>
        </div>

        <div id="focus-sheet" class="tab-content active">
            <div class="navigation-box">
                <button class="nav-btn" onclick="changeCenterDate(-1)">◀ Ngày trước</button>
                <button class="nav-btn" style="background: #ebf8ff; color: #2b6cb0;" onclick="resetToToday()">Hiện tại</button>
                <button class="nav-btn" onclick="changeCenterDate(1)">Ngày sau ▶</button>
            </div>
            <div class="timeline" id="timelineContainer"></div>
        </div>

        <div id="weekday-sheet" class="tab-content">
            <div class="table-container" id="weekdayTableContainer">
                <table>
                    <thead>
                        <tr>
                            <th>Ngày</th>
                            <th>Thứ</th>
                            <th>Người trực (Cả Ngày)</th>
                        </tr>
                    </thead>
                    <tbody id="weekdayTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="weekend-sheet" class="tab-content">
            <div class="table-container" id="weekendTableContainer">
                <table>
                    <thead>
                        <tr>
                            <th>Ngày</th>
                            <th>Thứ</th>
                            <th>Người trực (Đầu Ngày)</th>
                        </tr>
                    </thead>
                    <tbody id="weekendTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="swap-sheet" class="tab-content">
            <form class="swap-form" onsubmit="executeSwap(event)">
                <div class="form-group">
                    <label for="dateGoc">📅 Ngày cần đổi:</label>
                    <input type="date" id="dateGoc" onclick="this.showPicker()" onkeydown="return false" onselect="this.selectionStart = this.selectionEnd;" required>
                </div>

                <div class="form-group">
                    <label for="dateDoi">📅 Ngày muốn đổi:</label>
                    <input type="date" id="dateDoi" onclick="this.showPicker()" onkeydown="return false" onselect="this.selectionStart = this.selectionEnd;" required>
                </div>
                
                <button type="submit" class="submit-btn">Đổi</button>
            </form>
        </div>
    </div>

    <div id="toastNotification" class="toast-notification">✅ Đã đổi ngày trực!</div>

    <script>
        const GOOGLE_SHEET_API = "https://script.google.com/macros/s/AKfycbzEUdmmDtBwRXqLQ6PnP5vTqoPU6hKCf6yvX4lXb-rwGcV5SQaKsLC866A1Yxp2ukha/exec";

        const members = ["Võ Nguyễn Thanh Tú", "Trương Vĩnh Thuận", "Tăng Hồng Vủ Bảo", "Phạm Việt Huy - Bích Vân", "Nguyễn Lê Thái Hiền", "Trần Trung Bắc", "Nguyễn Văn Huy", "Phạm Huy Hùng", "Nguyễn Phúc Khang", "Nguyễn Dương Chí Tâm"];
        const team1 = ["Võ Nguyễn Thanh Tú", "Trương Vĩnh Thuận", "Tăng Hồng Vủ Bảo", "Phạm Việt Huy - Bích Vân", "Nguyễn Lê Thái Hiền"];
        const team2 = ["Trần Trung Bắc", "Nguyễn Văn Huy", "Phạm Huy Hùng", "Nguyễn Phúc Khang", "Nguyễn Dương Chí Tâm"];
        const BASE_DATE = new Date(2026, 4, 25);

        let swapHistory = []; 
        let isFetching = true; 
        let centerDate = new Date();
        const daysOfWeek = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];
        const realTodayStr = new Date().toDateString();

        function getStartOfWeek(date) {
            let d = new Date(date);
            let day = d.getDay();
            let diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        let weekdayCurrentDate = getStartOfWeek(new Date());
        let weekendCurrentDate = getStartOfWeek(new Date());

        function showToast() {
            const toast = document.getElementById('toastNotification');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Hàm đặt giới hạn ngày nhỏ nhất (min) trên giao diện chọn lịch
        function setupMinDateRestrictions() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            const minDateString = `${year}-${month}-${day}`;
            
            document.getElementById('dateGoc').min = minDateString;
            document.getElementById('dateDoi').min = minDateString;
        }

        function initApp() {
            setupMinDateRestrictions(); // Kích hoạt giới hạn ngày trên UI
            isFetching = true; 
            renderAll(); 

            fetch(GOOGLE_SHEET_API)
                .then(response => response.json())
                .then(data => {
                    isFetching = false; 
                    if (data && data.length > 0) {
                        swapHistory = data;
                    }
                    resetRenderPointers();
                    renderAll();
                })
                .catch(error => {
                    console.error("Lỗi kết nối API:", error);
                    isFetching = false; 
                    resetRenderPointers();
                    renderAll();
                });
        }

        function resetRenderPointers() {
            document.getElementById('weekdayTableBody').innerHTML = '';
            document.getElementById('weekendTableBody').innerHTML = '';
            weekdayCurrentDate = getStartOfWeek(new Date());
            weekendCurrentDate = getStartOfWeek(new Date());
        }

        function getRawDutyForDate(targetDate) {
            const startOfBaseWeek = getStartOfWeek(BASE_DATE);
            const startOfTargetWeek = getStartOfWeek(targetDate);
            const diffWeeks = Math.round((startOfTargetWeek - startOfBaseWeek) / (1000 * 60 * 60 * 24 * 7));
            if (diffWeeks < 0) return "Chưa có thông tin";

            let wDay = targetDate.getDay();
            if (wDay !== 0 && wDay !== 6) {
                let currentTeam = (diffWeeks % 2 === 0) ? team1 : team2;
                return currentTeam[wDay - 1];
            }

            let totalWeekendDaysCount = 0;
            let currentLoopDate = new Date(startOfBaseWeek);
            while (currentLoopDate <= targetDate) {
                let loopDay = currentLoopDate.getDay();
                if (loopDay === 0 || loopDay === 6) {
                    if (currentLoopDate.toDateString() === targetDate.toDateString()) {
                        if (loopDay === 6) {
                            let thursDate = new Date(currentLoopDate);
                            thursDate.setDate(currentLoopDate.getDate() - 2);
                            let thursPerson = getRawDutyForDate(thursDate);
                            if (thursPerson && thursPerson.includes("Phạm Việt Huy")) return "Bích Vân";
                        }
                        let assignedPerson = members[totalWeekendDaysCount % members.length];
                        if (loopDay === 0 && assignedPerson === "Phạm Việt Huy - Bích Vân") return "Phạm Việt Huy";
                        return assignedPerson;
                    }
                    if (loopDay === 6) {
                        let thursDate = new Date(currentLoopDate);
                        thursDate.setDate(currentLoopDate.getDate() - 2);
                        let thursPerson = getRawDutyForDate(thursDate);
                        if (!(thursPerson && thursPerson.includes("Phạm Việt Huy"))) totalWeekendDaysCount++;
                    } else {
                        totalWeekendDaysCount++;
                    }
                }
                currentLoopDate.setDate(currentLoopDate.getDate() + 1);
            }
            return "Chưa có thông tin";
        }

        function getDutyForDate(targetDate) {
            let currentKey = targetDate.toLocaleDateString('vi-VN');

            for (let i = 0; i < swapHistory.length; i++) {
                if (swapHistory[i].ngay_goc === currentKey) {
                    currentKey = swapHistory[i].ngay_doi;
                } else if (swapHistory[i].ngay_doi === currentKey) {
                    currentKey = swapHistory[i].ngay_goc;
                }
            }
            const parts = currentKey.split("/");
            const finalDate = new Date(parts[2], parts[1] - 1, parts[0]);
            const swappedName = getRawDutyForDate(finalDate);

            const originalName = getRawDutyForDate(targetDate);
            const isReallySwapped = (swappedName !== originalName);

            return { name: swappedName, swapped: isReallySwapped };
        }

        function executeSwap(e) {
            e.preventDefault();
            const inputGoc = document.getElementById('dateGoc').value;
            const inputDoi = document.getElementById('dateDoi').value;

            if (!inputGoc || !inputDoi) return;
            
            // Thông báo nếu người dùng cố tình nhập 2 ngày trùng nhau
            if (inputGoc === inputDoi) { 
                alert("Vui lòng chọn 2 ngày khác nhau!"); 
                return; 
            }

            const dGoc = new Date(inputGoc);
            const dDoi = new Date(inputDoi);
            const strGoc = dGoc.toLocaleDateString('vi-VN');
            const strDoi = dDoi.toLocaleDateString('vi-VN');

            swapHistory.push({ ngay_goc: strGoc, ngay_doi: strDoi });
            
            resetRenderPointers();
            renderAll();

            showToast();

            document.getElementById('dateGoc').value = '';
            document.getElementById('dateDoi').value = '';

            document.querySelectorAll('.tab-link')[0].click();

            fetch(GOOGLE_SHEET_API, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ngay_goc: strGoc, ngay_doi: strDoi })
            }).catch(err => console.error("Lỗi đẩy dữ liệu nền:", err));
        }

        function renderAll() {
            renderThreeDays();
            renderWeekdaySheet(40);
            renderWeekendSheet(16);
        }

        function renderThreeDays() {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';
            const offsets = [-1, 0, 1];

            offsets.forEach(offset => {
                let d = new Date(centerDate);
                d.setDate(centerDate.getDate() + offset);

                const duty = getDutyForDate(d);
                const isWeekend = (d.getDay() === 0 || d.getDay() === 6);

                const card = document.createElement('div');
                card.className = 'day-card';
                if (isWeekend) card.classList.add('weekend');
                if (offset === 0 && d.toDateString() === realTodayStr) card.classList.add('today');

                let loadingIconHTML = isFetching ? '<span class="inline-spinner"></span>' : '';
                let swappedIconHTML = (!isFetching && duty.swapped) ? '🔄' : '';

                card.innerHTML = `
                <div class="day-info">
                    ${daysOfWeek[d.getDay()]}
                    <span>${d.toLocaleDateString('vi-VN')}</span>
                </div>
                <div class="duty-info">
                    <div class="duty-label">${isWeekend ? 'Trực Cuối Tuần' : 'Trực Trong Tuần'}</div>
                    <div class="duty-name ${(!isFetching && duty.swapped) ? 'is-swapped' : ''}">
                        ${duty.name} ${swappedIconHTML} ${loadingIconHTML}
                    </div>
                </div>
            `;
                container.appendChild(card);
            });
        }

        function renderWeekdaySheet(daysToGenerate) {
            const tbody = document.getElementById('weekdayTableBody');
            let generatedCount = 0;

            while (generatedCount < daysToGenerate) {
                let loopDate = new Date(weekdayCurrentDate);
                let wDay = loopDate.getDay();

                if (wDay !== 0 && wDay !== 6) {
                    const duty = getDutyForDate(loopDate);
                    const row = document.createElement('tr');
                    if (loopDate.toDateString() === realTodayStr) row.className = 'table-today';

                    let loadingIconHTML = isFetching ? '<span class="inline-spinner"></span>' : '';
                    let swappedIconHTML = (!isFetching && duty.swapped) ? '🔄' : '';

                    row.innerHTML = `
                    <td>${loopDate.toLocaleDateString('vi-VN')}</td>
                    <td>${daysOfWeek[wDay]}</td>
                    <td>
                        <div class="cell-name ${(!isFetching && duty.swapped) ? 'is-swapped' : ''}">
                            ${duty.name} ${swappedIconHTML} ${loadingIconHTML}
                        </div>
                    </td>
                `;
                    tbody.appendChild(row);
                    generatedCount++;
                }
                weekdayCurrentDate.setDate(weekdayCurrentDate.getDate() + 1);
            }
        }

        function renderWeekendSheet(daysToGenerate) {
            const weekendTbody = document.getElementById('weekendTableBody');
            let generatedCount = 0;

            while (generatedCount < daysToGenerate) {
                let loopDate = new Date(weekendCurrentDate);
                let wDay = loopDate.getDay();

                if (wDay === 0 || wDay === 6) {
                    const duty = getDutyForDate(loopDate);
                    const row = document.createElement('tr');
                    row.className = 'table-weekend';
                    if (loopDate.toDateString() === realTodayStr) row.className = 'table-today';

                    let loadingIconHTML = isFetching ? '<span class="inline-spinner"></span>' : '';
                    let swappedIconHTML = (!isFetching && duty.swapped) ? '🔄' : '';

                    row.innerHTML = `
                    <td>${loopDate.toLocaleDateString('vi-VN')}</td>
                    <td>${daysOfWeek[wDay]}</td>
                    <td>
                        <div class="cell-name ${(!isFetching && duty.swapped) ? 'is-swapped' : ''}">
                            ${duty.name} ${swappedIconHTML} ${loadingIconHTML}
                        </div>
                    </td>
                `;
                    weekendTbody.appendChild(row);
                    generatedCount++;
                }
                weekendCurrentDate.setDate(weekendCurrentDate.getDate() + 1);
            }
        }

        function switchTab(event, tabId) {
            document.querySelectorAll('.tab-link').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function changeCenterDate(days) { centerDate.setDate(centerDate.getDate() + days); renderThreeDays(); }
        function resetToToday() { centerDate = new Date(); renderThreeDays(); }

        const weekdayContainer = document.getElementById('weekdayTableContainer');
        weekdayContainer.addEventListener('scroll', () => {
            if (weekdayContainer.scrollTop + weekdayContainer.clientHeight >= weekdayContainer.scrollHeight - 50) {
                renderWeekdaySheet(20);
            }
        });

        const weekendContainer = document.getElementById('weekendTableContainer');
        weekendContainer.addEventListener('scroll', () => {
            if (weekendContainer.scrollTop + weekendContainer.clientHeight >= weekendContainer.scrollHeight - 50) {
                renderWeekendSheet(10);
            }
        });

        initApp();
    </script>
</body>
</html>
