<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch trực</title>
    <style>
        :root {
            --primary: #0056B3;
            --bg-body: #f4f7f6;
            --border-color: #e2e8f0;
            --focus-color: #2ecc71;
            --text-main: #2d3748;
            --weekend-color: #b45309;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 30px 20px;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 750px;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #1a202c;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .sub-title {
            text-align: center;
            color: #718096;
            margin-bottom: 25px;
            font-size: 14px;
        }

        /* Menu di chuyển giữa các Sheet */
        .tabs-menu {
            display: flex;
            background: #edf2f7;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 25px;
            gap: 2px;
        }

        .tab-link {
            flex: 1;
            text-align: center;
            padding: 10px 5px;
            cursor: pointer;
            font-weight: 600;
            color: #4a5568;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 13px;
        }

        .tab-link.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* --- SHEET 1: FOCUS 3 NGÀY --- */
        .navigation-box {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .nav-btn {
            background: #edf2f7;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #4a5568;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: #e2e8f0;
            color: var(--primary);
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .day-card {
            display: grid;
            grid-template-columns: 160px 1fr;
            align-items: center;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: #fff;
        }

        .day-info {
            font-weight: bold;
            color: #4a5568;
            font-size: 16px;
        }

        .day-info span {
            display: block;
            font-size: 13px;
            font-weight: normal;
            color: #a0aec0;
            margin-top: 4px;
        }

        .duty-info {
            padding-left: 20px;
            border-left: 2px solid #edf2f7;
        }

        .duty-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #a0aec0;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .duty-name {
            font-size: 18px;
            font-weight: 700;
            color: #2d3748;
        }

        .day-card.weekend {
            background: #fffdf5;
            border-color: #fef3c7;
        }

        .day-card.weekend .day-info {
            color: var(--weekend-color);
        }

        .day-card.weekend .duty-info {
            border-left-color: #fef3c7;
        }

        .day-card.today {
            background: #ffffff;
            border: 3px solid var(--focus-color);
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.18);
            position: relative;
        }

        .day-card.today::after {
            content: "HÔM NAY";
            position: absolute;
            right: 20px;
            top: -12px;
            background: var(--focus-color);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        .day-card.today .day-info {
            color: var(--focus-color);
            font-size: 19px;
        }

        .day-card.today .duty-name {
            color: #000;
            font-size: 20px;
        }

        /* --- STYLES CHO CÁC SHEET FULL TABLE --- */
        .table-container {
            max-height: 60vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background: var(--primary);
            color: white;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        tr.table-weekend {
            background-color: #fffdf5;
            color: var(--weekend-color);
        }

        tr.table-today {
            background-color: #e8fbf0 !important;
            font-weight: bold;
        }

        .loading-text {
            text-align: center;
            padding: 15px;
            font-size: 13px;
            color: #a0aec0;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📋 Lịch trực</h1>
        <div class="sub-title"></div>

        <div class="tabs-menu">
            <div class="tab-link active" onclick="switchTab(event, 'focus-sheet')">🎯 Hôm Nay</div>
            <div class="tab-link" onclick="switchTab(event, 'weekday-sheet')">📜 Lịch Thứ 2 - Thứ 6</div>
            <div class="tab-link" onclick="switchTab(event, 'weekend-sheet')">🏖️ Lịch Cuối Tuần</div>
        </div>

        <div id="focus-sheet" class="tab-content active">
            <div class="navigation-box">
                <button class="nav-btn" onclick="changeCenterDate(-1)">◀ Ngày trước đó</button>
                <button class="nav-btn" style="background: #ebf8ff; color: #2b6cb0;" onclick="resetToToday()">Về Hiện
                    Tại</button>
                <button class="nav-btn" onclick="changeCenterDate(1)">Ngày tiếp theo ▶</button>
            </div>
            <div class="timeline" id="timelineContainer"></div>
        </div>

        <div id="weekday-sheet" class="tab-content">
            <div class="table-container" id="weekdayTableContainer">
                <table>
                    <thead>
                        <tr>
                            <th>Ngày dương lịch</th>
                            <th>Thứ</th>
                            <th>Người trực (Cả Ngày)</th>
                        </tr>
                    </thead>
                    <tbody id="weekdayTableBody"></tbody>
                </table>
                <div class="loading-text">Cuộn xuống để xem tiếp các tuần sau...</div>
            </div>
        </div>

        <div id="weekend-sheet" class="tab-content">
            <div class="table-container" id="weekendTableContainer">
                <table>
                    <thead>
                        <tr>
                            <th>Ngày dương lịch</th>
                            <th>Thứ</th>
                            <th>Người trực (Đầu Ngày)</th>
                        </tr>
                    </thead>
                    <tbody id="weekendTableBody"></tbody>
                </table>
                <div class="loading-text">Cuộn xuống để xem tiếp các tuần sau...</div>
            </div>
        </div>
    </div>

    <script>
        // Danh sách thành viên
        const members = [
            "Võ Nguyễn Thanh Tú",
            "Trương Vĩnh Thuận",
            "Tăng Hồng Vủ Bảo",
            "Phạm Việt Huy - Lê Thị Bích Vân",
            "Nguyễn Lê Thái Hiền",
            "Trần Trung Bắc",
            "Nguyễn Văn Huy",
            "Phạm Huy Hùng",
            "Nguyễn Phúc Khang",
            "Nguyễn Dương Chí Tâm"
        ];

        // Ngày gốc cố định thuật toán: 25/05/2026 (Thứ Hai)
        const BASE_DATE = new Date(2026, 4, 25);
        let centerDate = new Date();

        // Biến ngày chạy độc lập để render dữ liệu vô hạn cho 2 sheet lớn
        let weekdayCurrentDate = new Date(2026, 4, 26);
        let weekendCurrentDate = new Date(2026, 4, 26);

        const daysOfWeek = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];
        const realTodayStr = new Date().toDateString();

        // Thuật toán lõi: Tính chính xác ai trực vào một ngày bất kỳ (Xoay tua riêng biệt Trong tuần / Cuối tuần)
        function getDutyForDate(targetDate) {
            const diffTime = targetDate.getTime() - BASE_DATE.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

            let weekdayCounter = 0;
            let weekendCounter = 0;
            let assignedPerson = "";

            if (diffDays >= 0) {
                for (let i = 0; i <= diffDays; i++) {
                    let checkDate = new Date(BASE_DATE);
                    checkDate.setDate(BASE_DATE.getDate() + i);
                    let wDay = checkDate.getDay();

                    if (wDay === 0 || wDay === 6) {
                        if (i === diffDays) {
                            assignedPerson = members[weekendCounter % members.length];
                        }
                        weekendCounter++;
                    } else {
                        if (i === diffDays) {
                            assignedPerson = members[weekdayCounter % members.length];
                        }
                        weekdayCounter++;
                    }
                }

                // --- LOGIC ĐẶC BIỆT 1: XỬ LÝ THỨ BẢY DỰA VÀO THỨ NĂM TRƯỚC ĐÓ ---
                if (targetDate.getDay() === 6) {
                    let thursDate = new Date(targetDate);
                    thursDate.setDate(targetDate.getDate() - 2);

                    let thursPerson = getDutyForDate(thursDate);

                    if (thursPerson && thursPerson.includes("Phạm Việt Huy - Lê Thị Bích Vân")) {
                        assignedPerson = "Lê Thị Bích Vân";
                    }
                }

                // --- LOGIC ĐẶC BIỆT 2: NẾU CHỦ NHẬT LÀ HUY + VÂN THÌ CHỈ GIỮ LẠI ANH HUY ---
                if (targetDate.getDay() === 0) {
                    if (assignedPerson && assignedPerson.includes("Phạm Việt Huy - Lê Thị Bích Vân")) {
                        assignedPerson = "Phạm Việt Huy";
                    }
                }

            } else {
                return "Chưa cấu hình";
            }
            return assignedPerson;
        }

        // --- RENDER SHEET 1: FOCUS 3 NGÀY ---
        function renderThreeDays() {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';
            const offsets = [-1, 0, 1];

            offsets.forEach(offset => {
                let d = new Date(centerDate);
                d.setDate(centerDate.getDate() + offset);

                const person = getDutyForDate(d);
                const isWeekend = (d.getDay() === 0 || d.getDay() === 6);

                const card = document.createElement('div');
                card.className = 'day-card';
                if (isWeekend) card.classList.add('weekend');
                if (offset === 0 && d.toDateString() === realTodayStr) card.classList.add('today');

                let relativeLabel = "";
                //if (offset === -1) relativeLabel = " (Hôm qua)";
                //if (offset === 1) relativeLabel = " (Ngày mai)";

                card.innerHTML = `
                <div class="day-info">
                    ${daysOfWeek[d.getDay()]}
                    <span>${d.toLocaleDateString('vi-VN')}${relativeLabel}</span>
                </div>
                <div class="duty-info">
                    <div class="duty-label">${isWeekend ? 'Trực Cuối Tuần (Đầu Ngày)' : 'Trực Trong Tuần (Sáng & Chiều)'}</div>
                    <div class="duty-name">${person}</div>
                </div>
            `;
                container.appendChild(card);
            });
        }

        // --- RENDER SHEET 2: FULL LỊCH THỨ 2 - THỨ 6 (Bỏ qua T7, CN) ---
        function renderWeekdaySheet(daysToGenerate) {
            const tbody = document.getElementById('weekdayTableBody');
            let generatedCount = 0;

            while (generatedCount < daysToGenerate) {
                let loopDate = new Date(weekdayCurrentDate);
                let wDay = loopDate.getDay();

                if (wDay !== 0 && wDay !== 6) { // Chỉ lấy Thứ 2 đến Thứ 6
                    const person = getDutyForDate(loopDate);
                    const row = document.createElement('tr');
                    if (loopDate.toDateString() === realTodayStr) row.className = 'table-today';

                    row.innerHTML = `
                    <td>${loopDate.toLocaleDateString('vi-VN')}</td>
                    <td>${daysOfWeek[wDay]}</td>
                    <td><strong>${person}</strong></td>
                `;
                    tbody.appendChild(row);
                    generatedCount++;
                }
                weekdayCurrentDate.setDate(weekdayCurrentDate.getDate() + 1);
            }
        }

        // --- RENDER SHEET 3: FULL LỊCH CUỐI TUẦN (Chỉ lấy T7, CN) ---
        function renderWeekendSheet(daysToGenerate) {
            const tbody = document.getElementById('weekdayTableBody');
            const weekendTbody = document.getElementById('weekendTableBody') || tbody;
            let generatedCount = 0;

            while (generatedCount < daysToGenerate) {
                let loopDate = new Date(weekendCurrentDate);
                let wDay = loopDate.getDay();

                if (wDay === 0 || wDay === 6) { // Chỉ lấy Thứ 7 và Chủ Nhật
                    const person = getDutyForDate(loopDate);
                    const row = document.createElement('tr');
                    row.className = 'table-weekend';
                    if (loopDate.toDateString() === realTodayStr) row.className = 'table-today';

                    row.innerHTML = `
                    <td>${loopDate.toLocaleDateString('vi-VN')}</td>
                    <td>${daysOfWeek[wDay]}</td>
                    <td><strong>${person}</strong></td>
                `;
                    weekendTbody.appendChild(row);
                    generatedCount++;
                }
                weekendCurrentDate.setDate(weekendCurrentDate.getDate() + 1);
            }
        }

        // Hàm chuyển đổi tab mượt mà giữa các sheet
        function switchTab(event, tabId) {
            document.querySelectorAll('.tab-link').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // Điều hướng nhanh cho Sheet 1
        function changeCenterDate(days) { centerDate.setDate(centerDate.getDate() + days); renderThreeDays(); }
        function resetToToday() { centerDate = new Date(); renderThreeDays(); }

        // Xử lý cuộn vô hạn cho Sheet Thứ 2 - Thứ 6
        const weekdayContainer = document.getElementById('weekdayTableContainer');
        weekdayContainer.addEventListener('scroll', () => {
            if (weekdayContainer.scrollTop + weekdayContainer.clientHeight >= weekdayContainer.scrollHeight - 50) {
                renderWeekdaySheet(20);
            }
        });

        // Xử lý cuộn vô hạn cho Sheet Cuối Tuần
        const weekendContainer = document.getElementById('weekendTableContainer');
        weekendContainer.addEventListener('scroll', () => {
            if (weekendContainer.scrollTop + weekendContainer.clientHeight >= weekendContainer.scrollHeight - 50) {
                renderWeekendSheet(10);
            }
        });

        // Khởi tạo nạp dữ liệu ban đầu cho các Sheet
        renderThreeDays();
        renderWeekdaySheet(40);
        renderWeekendSheet(16); 
    </script>

</body>

</html>
