<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch trực</title>
    <style>
        :root {
            --primary: #0056B3;
            --bg-body: #f4f7f6;
            --border-color: #e2e8f0;
            --focus-color: #2ecc71;
            --text-main: #2d3748;
            --weekend-color: #b45309;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 30px 20px;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 750px;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin: 0 auto;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: #1a202c;
            margin-bottom: 5px;
            font-size: 24px;
        }

        .sub-title {
            text-align: center;
            color: #718096;
            margin-bottom: 25px;
            font-size: 14px;
        }

        /* Menu di chuyển giữa các Sheet */
        .tabs-menu {
            display: flex;
            background: #edf2f7;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 25px;
            gap: 2px;
        }

        .tab-link {
            flex: 1;
            text-align: center;
            padding: 10px 5px;
            cursor: pointer;
            font-weight: 600;
            color: #4a5568;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 13px;
            white-space: nowrap;
        }

        .tab-link.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* --- SHEET 1: FOCUS 3 NGÀY --- */
        .navigation-box {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            gap: 8px;
        }

        .nav-btn {
            background: #edf2f7;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #4a5568;
            transition: all 0.2s;
            font-size: 13px;
            flex: 1;
            text-align: center;
        }

        .nav-btn:hover {
            background: #e2e8f0;
            color: var(--primary);
        }

        .timeline {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .day-card {
            display: grid;
            grid-template-columns: 160px 1fr;
            align-items: center;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: #fff;
            box-sizing: border-box;
        }

        .day-info {
            font-weight: bold;
            color: #4a5568;
            font-size: 16px;
        }

        .day-info span {
            display: block;
            font-size: 13px;
            font-weight: normal;
            color: #a0aec0;
            margin-top: 4px;
        }

        .duty-info {
            padding-left: 20px;
            border-left: 2px solid #edf2f7;
        }

        .duty-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #a0aec0;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .duty-name {
            font-size: 18px;
            font-weight: 700;
            color: #2d3748;
        }

        .day-card.weekend {
            background: #fffdf5;
            border-color: #fef3c7;
        }

        .day-card.weekend .day-info {
            color: var(--weekend-color);
        }

        .day-card.weekend .duty-info {
            border-left-color: #fef3c7;
        }

        .day-card.today {
            background: #ffffff;
            border: 3px solid var(--focus-color);
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.18);
            position: relative;
        }

        .day-card.today::after {
            content: "HÔM NAY";
            position: absolute;
            right: 20px;
            top: -12px;
            background: var(--focus-color);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        .day-card.today .day-info {
            color: var(--focus-color);
            font-size: 19px;
        }

        .day-card.today .duty-name {
            color: #000;
            font-size: 20px;
        }

        /* --- TỐI ƯU HIỂN THỊ VỪA KHÍT 7 DÒNG --- */
        .table-container {
            height: 344px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            table-layout: fixed;
        }

        th,
        td {
            padding: 12px 16px;
            line-height: 19px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            box-sizing: border-box;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        th:nth-child(1),
        td:nth-child(1) {
            width: 25%;
        }

        th:nth-child(2),
        td:nth-child(2) {
            width: 20%;
        }

        th:nth-child(3),
        td:nth-child(3) {
            width: 55%;
        }

        th {
            background: var(--primary);
            color: white;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        tr.table-weekend {
            background-color: #fffdf5;
            color: var(--weekend-color);
        }

        tr.table-today {
            background-color: #e8fbf0 !important;
            font-weight: bold;
        }

        .loading-text {
            text-align: center;
            padding: 15px;
            font-size: 13px;
            color: #a0aec0;
            font-style: italic;
        }

        /* --- CẤU HÌNH RESPONSIVE TRÊN ĐIỆN THOẠI (MÀN HÌNH < 600px) --- */
        @media (max-width: 600px) {
            body {
                padding: 10px 8px;
            }

            .container {
                padding: 15px 10px;
                border-radius: 12px;
            }

            h1 {
                font-size: 20px;
                margin-bottom: 2px;
            }

            .sub-title {
                margin-bottom: 15px;
            }

            .tabs-menu {
                margin-bottom: 15px;
            }

            .tab-link {
                font-size: 11px;
                padding: 8px 2px;
            }

            .navigation-box {
                margin-bottom: 15px;
                gap: 5px;
            }

            .nav-btn {
                font-size: 11px;
                padding: 6px 4px;
            }

            .timeline {
                gap: 8px;
            }

            .day-card {
                grid-template-columns: 85px 1fr;
                gap: 10px;
                padding: 10px 12px;
            }

            .day-info {
                font-size: 13px;
            }

            .day-info span {
                font-size: 11px;
                margin-top: 2px;
            }

            .duty-info {
                padding-left: 10px;
                padding-top: 0;
                border-left: 2px solid #edf2f7;
                border-top: none;
            }

            .day-card.weekend .duty-info {
                border-left-color: #fef3c7;
            }

            .duty-label {
                font-size: 9px;
                margin-bottom: 1px;
            }

            .duty-name {
                font-size: 14px;
            }

            .day-card.today {
                transform: none;
                margin: 0;
                border-width: 2px;
            }

            .day-card.today::after {
                right: 10px;
                top: -8px;
                font-size: 8px;
                padding: 1px 6px;
            }

            .day-card.today .day-info {
                font-size: 14px;
            }

            .day-card.today .duty-name {
                font-size: 15px;
            }

            th,
            td {
                padding: 10px 6px;
                line-height: 17px;
                font-size: 12px;
            }

            th:nth-child(1),
            td:nth-child(1) {
                width: 28%;
            }

            th:nth-child(2),
            td:nth-child(2) {
                width: 22%;
            }

            th:nth-child(3),
            td:nth-child(3) {
                width: 50%;
            }

            .table-container {
                height: 304px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📋 Lịch trực</h1>
        <div class="sub-title"></div>

        <div class="tabs-menu">
            <div class="tab-link active" onclick="switchTab(event, 'focus-sheet')">🎯 Hôm Nay</div>
            <div class="tab-link" onclick="switchTab(event, 'weekday-sheet')">📜 Thứ 2 - 6</div>
            <div class="tab-link" onclick="switchTab(event, 'weekend-sheet')">🏖️ Cuối Tuần</div>
        </div>

        <div id="focus-sheet" class="tab-content active">
            <div class="navigation-box">
                <button class="nav-btn" onclick="changeCenterDate(-1)">◀ Ngày trước</button>
                <button class="nav-btn" style="background: #ebf8ff; color: #2b6cb0;" onclick="resetToToday()">Hiện tại</button>
                <button class="nav-btn" onclick="changeCenterDate(1)">Ngày sau ▶</button>
            </div>
            <div class="timeline" id="timelineContainer"></div>
        </div>

        <div id="weekday-sheet" class="tab-content">
            <div class="table-container" id="weekdayTableContainer">
                <table>
                    <thead>
                        <tr>
                            <th>Ngày</th>
                            <th>Thứ</th>
                            <th>Người trực (Cả Ngày)</th>
                        </tr>
                    </thead>
                    <tbody id="weekdayTableBody"></tbody>
                </table>
                <div class="loading-text">Cuộn xuống để xem tiếp...</div>
            </div>
        </div>

        <div id="weekend-sheet" class="tab-content">
            <div class="table-container" id="weekendTableContainer">
                <table>
                    <thead>
                        <tr>
                            <th>Ngày</th>
                            <th>Thứ</th>
                            <th>Người trực (Đầu Ngày)</th>
                        </tr>
                    </thead>
                    <tbody id="weekendTableBody"></tbody>
                </table>
                <div class="loading-text">Cuộn xuống để xem tiếp...</div>
            </div>
        </div>
    </div>

    <script>
        // Danh sách 10 thành viên xoay tua chính
        const members = [
            "Võ Nguyễn Thanh Tú",
            "Trương Vĩnh Thuận",
            "Tăng Hồng Vủ Bảo",
            "Phạm Việt Huy - Lê Thị Bích Vân",
            "Nguyễn Lê Thái Hiền",
            "Trần Trung Bắc",
            "Nguyễn Văn Huy",
            "Phạm Huy Hùng",
            "Nguyễn Phúc Khang",
            "Nguyễn Dương Chí Tâm"
        ];

        // Chia 2 tốp chạy từ Thứ 2 đến Thứ 6 xen kẽ nhau từng tuần
        const team1 = ["Võ Nguyễn Thanh Tú", "Trương Vĩnh Thuận", "Tăng Hồng Vủ Bảo", "Phạm Việt Huy - Lê Thị Bích Vân", "Nguyễn Lê Thái Hiền"];
        const team2 = ["Trần Trung Bắc", "Nguyễn Văn Huy", "Phạm Huy Hùng", "Nguyễn Phúc Khang", "Nguyễn Dương Chí Tâm"];

        // Ngày gốc cố định thuật toán: 25/05/2026 (Thứ Hai) - Quy ước là Tuần của Tốp 1
        const BASE_DATE = new Date(2026, 4, 25);
        let centerDate = new Date();

        const daysOfWeek = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];
        const realTodayStr = new Date().toDateString();

        // Hàm phụ trợ: Lấy ngày Thứ Hai đầu tuần của một ngày bất kỳ
        function getStartOfWeek(date) {
            let d = new Date(date);
            let day = d.getDay();
            let diff = d.getDate() - day + (day === 0 ? -6 : 1); // Điều chỉnh nếu là CN
            return new Date(d.setDate(diff));
        }

        // Khởi tạo ngày cho 2 bảng bắt đầu chính xác từ Thứ Hai của tuần hiện tại
        let weekdayCurrentDate = getStartOfWeek(new Date());
        let weekendCurrentDate = getStartOfWeek(new Date());

        // THUẬT TOÁN LÕI TÍNH LỊCH TRỰC CHÍNH XÁC
        function getDutyForDate(targetDate) {
            const startOfBaseWeek = getStartOfWeek(BASE_DATE);
            const startOfTargetWeek = getStartOfWeek(targetDate);
            const diffWeeks = Math.round((startOfTargetWeek - startOfBaseWeek) / (1000 * 60 * 60 * 24 * 7));
            
            if (diffWeeks < 0) return "Chưa cấu hình";

            let wDay = targetDate.getDay();

            // --- TRƯỜNG HỢP TRONG TUẦN (THỨ 2 - THỨ 6) ---
            if (wDay !== 0 && wDay !== 6) {
                let currentTeam = (diffWeeks % 2 === 0) ? team1 : team2;
                let memberIndex = wDay - 1; 
                return currentTeam[memberIndex];
            }

            // --- TRƯỜNG HỢP CUỐI TUẦN (THỨ 7 & CHỦ NHẬT) ---
            let totalWeekendDaysCount = 0;
            let currentLoopDate = new Date(startOfBaseWeek);
            
            while (currentLoopDate <= targetDate) {
                let loopDay = currentLoopDate.getDay();
                if (loopDay === 0 || loopDay === 6) {
                    
                    if (currentLoopDate.toDateString() === targetDate.toDateString()) {
                        // 1. Nếu là Thứ 7
                        if (loopDay === 6) {
                            let thursDate = new Date(currentLoopDate);
                            thursDate.setDate(currentLoopDate.getDate() - 2);
                            let thursPerson = getDutyForDate(thursDate);

                            if (thursPerson && thursPerson.includes("Phạm Việt Huy")) {
                                return "Lê Thị Bích Vân";
                            }
                        }
                        
                        // Lấy người trực từ danh sách xoay tua 10 người
                        let assignedPerson = members[totalWeekendDaysCount % members.length];
                        
                        // LOGIC MỚI: Nếu là Chủ Nhật và trúng cặp Huy - Vân thì chỉ hiện Phạm Việt Huy
                        if (loopDay === 0 && assignedPerson === "Phạm Việt Huy - Lê Thị Bích Vân") {
                            return "Phạm Việt Huy";
                        }
                        
                        return assignedPerson;
                    }

                    if (loopDay === 6) {
                        let thursDate = new Date(currentLoopDate);
                        thursDate.setDate(currentLoopDate.getDate() - 2);
                        let thursPerson = getDutyForDate(thursDate);
                        
                        if (!(thursPerson && thursPerson.includes("Phạm Việt Huy"))) {
                            totalWeekendDaysCount++;
                        }
                    } else {
                        totalWeekendDaysCount++;
                    }
                }
                currentLoopDate.setDate(currentLoopDate.getDate() + 1);
            }

            return "Chưa cấu hình";
        }

        // --- RENDER SHEET 1: FOCUS 3 NGÀY ---
        function renderThreeDays() {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';
            const offsets = [-1, 0, 1];

            offsets.forEach(offset => {
                let d = new Date(centerDate);
                d.setDate(centerDate.getDate() + offset);

                const person = getDutyForDate(d);
                const isWeekend = (d.getDay() === 0 || d.getDay() === 6);

                const card = document.createElement('div');
                card.className = 'day-card';
                if (isWeekend) card.classList.add('weekend');
                if (offset === 0 && d.toDateString() === realTodayStr) card.classList.add('today');

                card.innerHTML = `
                <div class="day-info">
                    ${daysOfWeek[d.getDay()]}
                    <span>${d.toLocaleDateString('vi-VN')}</span>
                </div>
                <div class="duty-info">
                    <div class="duty-label">${isWeekend ? 'Trực Cuối Tuần (Đầu Ngày)' : 'Trực Trong Tuần (Sáng & Chiều)'}</div>
                    <div class="duty-name">${person}</div>
                </div>
            `;
                container.appendChild(card);
            });
        }

        // --- RENDER SHEET 2: FULL LỊCH THỨ 2 - THỨ 6 ---
        function renderWeekdaySheet(daysToGenerate) {
            const tbody = document.getElementById('weekdayTableBody');
            let generatedCount = 0;

            while (generatedCount < daysToGenerate) {
                let loopDate = new Date(weekdayCurrentDate);
                let wDay = loopDate.getDay();

                if (wDay !== 0 && wDay !== 6) {
                    const person = getDutyForDate(loopDate);
                    const row = document.createElement('tr');
                    if (loopDate.toDateString() === realTodayStr) row.className = 'table-today';

                    row.innerHTML = `
                    <td>${loopDate.toLocaleDateString('vi-VN')}</td>
                    <td>${daysOfWeek[wDay]}</td>
                    <td><strong>${person}</strong></td>
                `;
                    tbody.appendChild(row);
                    generatedCount++;
                }
                weekdayCurrentDate.setDate(weekdayCurrentDate.getDate() + 1);
            }
        }

        // --- RENDER SHEET 3: FULL LỊCH CUỐI TUẦN ---
        function renderWeekendSheet(daysToGenerate) {
            const weekendTbody = document.getElementById('weekendTableBody');
            let generatedCount = 0;

            while (generatedCount < daysToGenerate) {
                let loopDate = new Date(weekendCurrentDate);
                let wDay = loopDate.getDay();

                if (wDay === 0 || wDay === 6) {
                    const person = getDutyForDate(loopDate);
                    const row = document.createElement('tr');
                    row.className = 'table-weekend';
                    if (loopDate.toDateString() === realTodayStr) row.className = 'table-today';

                    row.innerHTML = `
                    <td>${loopDate.toLocaleDateString('vi-VN')}</td>
                    <td>${daysOfWeek[wDay]}</td>
                    <td><strong>${person}</strong></td>
                `;
                    weekendTbody.appendChild(row);
                    generatedCount++;
                }
                weekendCurrentDate.setDate(weekendCurrentDate.getDate() + 1);
            }
        }

        // Hàm chuyển đổi tab
        function switchTab(event, tabId) {
            document.querySelectorAll('.tab-link').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // Điều hướng nhanh cho Sheet 1
        function changeCenterDate(days) { centerDate.setDate(centerDate.getDate() + days); renderThreeDays(); }
        function resetToToday() { centerDate = new Date(); renderThreeDays(); }

        // Xử lý cuộn vô hạn cho Sheet Thứ 2 - Thứ 6
        const weekdayContainer = document.getElementById('weekdayTableContainer');
        weekdayContainer.addEventListener('scroll', () => {
            if (weekdayContainer.scrollTop + weekdayContainer.clientHeight >= weekdayContainer.scrollHeight - 50) {
                renderWeekdaySheet(20);
            }
        });

        // Xử lý cuộn vô hạn cho Sheet Cuối Tuần
        const weekendContainer = document.getElementById('weekendTableContainer');
        weekendContainer.addEventListener('scroll', () => {
            if (weekendContainer.scrollTop + weekendContainer.clientHeight >= weekendContainer.scrollHeight - 50) {
                renderWeekendSheet(10);
            }
        });

        // Khởi tạo nạp dữ liệu ban đầu
        renderThreeDays();
        renderWeekdaySheet(40);
        renderWeekendSheet(16); 
    </script>

</body>

</html>
